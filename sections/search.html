<section class="hero" id="search">
  <div class="hero__content">
    <h1 class="hero__title">Clon Inicial de MercadoLibre</h1>
    <p class="hero__subtitle">
      Taller universitario de trabajo colaborativo con Git y GitFlow.
    </p>

    <form class="hero__search" id="secondary-search-form">
      <input
        type="text"
        id="secondary-search-input"
        class="hero__search-input"
        placeholder="Buscar productos destacados..."
        autocomplete="off"
      />
      <button type="submit" class="btn btn--primary">Buscar</button>
    </form>

    <p class="hero__hint">
      Prueba buscar:
      <span class="hero__hint-keyword">laptop</span>,
      <span class="hero__hint-keyword">smartphone</span>,
      <span class="hero__hint-keyword">audífonos</span>.
    </p>
  </div>
</section>
